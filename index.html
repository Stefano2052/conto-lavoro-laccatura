<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Conto Lavoro Laccatura</title>

  <script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #E79E2F;
      --primary-dark: #C9831F;
      --secondary: #A8A29E;
      --background: #F7F5F2;
      --surface: #FFFFFF;
      --border: #E5E2DE;
      --text-primary: #2F2F2F;
      --text-secondary: #6F6F6F;
      --shadow-soft: 0 6px 18px rgba(47, 47, 47, 0.08);
      --shadow-focus: 0 0 0 3px rgba(231, 158, 47, 0.18);
      --success-bg: #F7EBD8;
      --success-text: #8A5A16;
      --info-bg: #F3EFE8;
      --info-text: #6F6F6F;
      --error-bg: #F9E3E0;
      --error-text: #9B4A43;
      --selected-bg: #FCF3E3;
      --hover-row: #FBF9F6;
      --section-bg: #F5F1EA;
      --radius: 16px;
      --radius-sm: 12px;
      --transition: 0.2s ease;
    }

    html, body {
      font-family: Arial, sans-serif;
      background: var(--background);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    .app-header {
      background: var(--surface);
      color: var(--text-primary);
      padding: 14px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    @media (min-width: 480px) {
      .app-header { padding: 14px 20px; }
    }
    .app-header h1 { font-size: 18px; font-weight: 700; }
    .app-header .subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    .app-content {
      padding: 16px;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 100px;
    }
    @media (min-width: 480px) {
      .app-content { padding: 20px; padding-bottom: 100px; }
    }

    .nav-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 5px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border);
    }
    .nav-tab {
      flex: 1;
      text-align: center;
      padding: 12px 6px;
      border-radius: var(--radius-sm);
      min-height: 46px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid transparent;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-tab .tab-icon { font-size: 18px; line-height: 1; }
    .nav-tab.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 2px 8px rgba(231, 158, 47, 0.3);
    }
    .nav-tab:not(.active):hover { background: var(--hover-row); }
    .nav-tab:not(.active):active { background: var(--selected-bg); }

    .phase-panel { display: none; animation: fadeIn 0.3s ease; }
    .phase-panel.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border);
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .icon { font-size: 18px; }

    /* Anteprima foto scattata — mostrata brevemente prima della lettura */
    .photo-preview {
      width: 100%;
      max-height: 180px;
      object-fit: contain;
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      display: none;
      background: var(--background);
    }

    .field-group { margin-bottom: 14px; }

    .field-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
      display: block;
    }

    .field-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      min-height: 48px;
      font-size: 16px;
      font-family: Arial, sans-serif;
      color: var(--text-primary);
      background: var(--surface);
      transition: var(--transition);
      -webkit-appearance: none;
      appearance: none;
    }
    .field-input::placeholder { color: var(--text-secondary); }

    .field-input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--surface);
      box-shadow: var(--shadow-focus);
    }

    .field-input.scanned {
      border-color: var(--primary);
      background: var(--selected-bg);
    }

    .field-input[readonly] { cursor: default; }

    .scanned-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 700;
      color: var(--success-text);
      margin-left: 8px;
    }

    .btn {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      min-height: 50px;
      font-size: 16px;
      font-family: Arial, sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .btn-primary:hover:not(:disabled) { background: var(--primary-dark); border-color: var(--primary-dark); }

    .btn-scan {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      font-size: 15px;
    }
    .btn-scan:hover:not(:disabled) { background: var(--primary-dark); border-color: var(--primary-dark); }

    .btn-confirm {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      margin-top: 8px;
    }
    .btn-confirm:hover:not(:disabled) { background: var(--primary-dark); border-color: var(--primary-dark); }

    .btn-stop {
      background: var(--error-bg);
      color: var(--error-text);
      border-color: var(--error-text);
      font-size: 15px;
    }

    .btn-reset {
      background: var(--surface);
      color: var(--text-secondary);
      border-color: var(--border);
      font-size: 14px;
      padding: 12px;
      margin-top: 4px;
    }
    .btn-reset:hover:not(:disabled) { background: var(--hover-row); }

    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 700;
      z-index: 200;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 90%;
      text-align: center;
      box-shadow: var(--shadow-soft);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--primary); }
    .toast.error { background: var(--error-bg); color: var(--error-text); border: 1px solid var(--error-text); }
    .toast.warning { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--primary); }
    .toast.info { background: var(--info-bg); color: var(--info-text); border: 1px solid var(--border); }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 14px 10px;
      text-align: center;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border);
    }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }

    .stat-card.aperti .stat-number { color: var(--primary); }
    .stat-card.prelevati .stat-number { color: var(--primary-dark); }
    .stat-card.chiusi .stat-number { color: var(--success-text); }

    .log-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .log-item:last-child { border-bottom: none; }

    .log-item-clickable { cursor: pointer; border-radius: 8px; transition: var(--transition); }
    .log-item-clickable:hover { background: var(--hover-row); margin: 0 -4px; padding: 12px 4px; }
    .log-item-clickable:active { background: var(--selected-bg); }
    .log-cancel {
      color: var(--error-text);
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .log-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .log-dot.aperto { background: var(--primary); }
    .log-dot.prelevato { background: var(--primary-dark); }
    .log-dot.chiuso { background: var(--success-text); }

    .log-info { flex: 1; min-width: 0; }

    .log-codes {
      font-size: 13px;
      font-weight: 700;
      word-break: break-word;
      color: var(--text-primary);
    }

    .log-date {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .log-stato {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .log-stato.aperto { background: var(--success-bg); color: var(--success-text); }
    .log-stato.prelevato { background: var(--info-bg); color: var(--info-text); }
    .log-stato.chiuso { background: var(--section-bg); color: var(--text-secondary); }

    .field-input-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    .field-input-row .field-input {
      flex: 1;
      min-width: 0;
    }
    .btn-scan-inline {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-scan-inline:active { background: var(--primary-dark); transform: translateY(1px); }
    .btn-scan-inline:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .manual-toggle { text-align: center; margin-top: 8px; }
    .manual-toggle button {
      background: none; border: none;
      color: var(--primary);
      font-size: 13px; font-weight: 700;
      font-family: Arial, sans-serif;
      cursor: pointer; padding: 8px;
      text-decoration: underline;
    }

    /* Barra diagnostica scanner — visibile durante la scansione */

    .scan-debug {
      min-height: 20px;
      font-size: 11px;
      font-family: monospace;
      color: var(--text-secondary);
      text-align: center;
      padding: 4px 8px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .scan-debug.active { color: var(--success-text); }
    .scan-debug.warn   { color: var(--primary-dark); }
  </style>
</head>
<body>

  <div class="app-header">
    <h1>&#128230; Conto Lavoro Laccatura</h1>
    <div class="subtitle">Scanner &amp; Tracciamento</div>
  </div>

  <div class="app-content">

    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchPhase('registrazione')" id="tab-registrazione">
        <span class="tab-icon">&#128221;</span>
        <span>Registra</span>
      </button>
      <button class="nav-tab" onclick="switchPhase('prelievo')" id="tab-prelievo">
        <span class="tab-icon">&#128230;</span>
        <span>Prelievo</span>
      </button>
      <button class="nav-tab" onclick="switchPhase('ricezione')" id="tab-ricezione">
        <span class="tab-icon">&#9989;</span>
        <span>Ricezione</span>
      </button>
      <button class="nav-tab" onclick="switchPhase('monitor')" id="tab-monitor">
        <span class="tab-icon">&#128202;</span>
        <span>Monitor</span>
      </button>
    </div>

    <!-- FASE 1: REGISTRAZIONE -->
    <div class="phase-panel active" id="panel-registrazione">
      <div class="card">
        <div class="field-group">
          <div class="field-label">
            Codice ODV
            <span class="scanned-badge" id="reg-odv-badge" style="display:none">&#9989; scansionato</span>
          </div>
          <div class="field-input-row">
            <input type="text" class="field-input" id="reg-odv" placeholder="Digita o scansiona il codice ODV" oninput="checkRegReady()">
            <button class="btn-scan-inline" id="reg-odv-scan-btn" onclick="capturePhotoForRegField('odv')" title="Scansiona ODV"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><rect x="1" y="3" width="2" height="18"/><rect x="4" y="3" width="1" height="18"/><rect x="6" y="3" width="3" height="18"/><rect x="10" y="3" width="1" height="18"/><rect x="12" y="3" width="2" height="18"/><rect x="15" y="3" width="1" height="18"/><rect x="17" y="3" width="3" height="18"/><rect x="21" y="3" width="2" height="18"/></svg></button>
          </div>
          <input type="file" id="file-reg-odv" accept="image/*" capture="environment" style="display:none" onchange="processRegFieldPhoto(this,'odv')">
          <div class="scan-debug" id="reg-odv-debug"></div>
        </div>
        <div class="field-group">
          <div class="field-label">
            Codice CL
            <span class="scanned-badge" id="reg-cl-badge" style="display:none">&#9989; scansionato</span>
          </div>
          <div class="field-input-row">
            <input type="text" class="field-input" id="reg-cl" placeholder="Digita o scansiona il codice CL" oninput="checkRegReady()">
            <button class="btn-scan-inline" id="reg-cl-scan-btn" onclick="capturePhotoForRegField('cl')" title="Scansiona CL"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><rect x="1" y="3" width="2" height="18"/><rect x="4" y="3" width="1" height="18"/><rect x="6" y="3" width="3" height="18"/><rect x="10" y="3" width="1" height="18"/><rect x="12" y="3" width="2" height="18"/><rect x="15" y="3" width="1" height="18"/><rect x="17" y="3" width="3" height="18"/><rect x="21" y="3" width="2" height="18"/></svg></button>
          </div>
          <input type="file" id="file-reg-cl" accept="image/*" capture="environment" style="display:none" onchange="processRegFieldPhoto(this,'cl')">
          <div class="scan-debug" id="reg-cl-debug"></div>
        </div>
        <div class="field-group">
          <div class="field-label">Data consegna prevista</div>
          <input type="date" class="field-input" id="reg-data" oninput="checkRegReady()">
        </div>
        <button class="btn btn-confirm" id="reg-confirm-btn" onclick="confermaRegistrazione()" disabled>
          &#10004; Conferma Registrazione
        </button>
        <button class="btn btn-reset" onclick="resetRegistrazione()">Resetta campi</button>
      </div>
    </div>

    <!-- FASE 2: PRELIEVO -->
    <div class="phase-panel" id="panel-prelievo">
      <div class="card">
        <div class="field-group">
          <div class="field-label">Codice ODV</div>
          <div class="field-input-row">
            <input type="text" class="field-input" id="prel-odv" placeholder="Digita o scansiona il codice ODV" oninput="document.getElementById('prel-confirm-btn').disabled=!this.value.trim()">
            <button class="btn-scan-inline" id="prel-scan-btn" onclick="capturePhoto('prelievo')" title="Scansiona ODV"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><rect x="1" y="3" width="2" height="18"/><rect x="4" y="3" width="1" height="18"/><rect x="6" y="3" width="3" height="18"/><rect x="10" y="3" width="1" height="18"/><rect x="12" y="3" width="2" height="18"/><rect x="15" y="3" width="1" height="18"/><rect x="17" y="3" width="3" height="18"/><rect x="21" y="3" width="2" height="18"/></svg></button>
          </div>
          <input type="file" id="file-prel" accept="image/*" capture="environment" style="display:none" onchange="processPhotoFile(this,'prelievo')">
          <div class="scan-debug" id="prel-scan-debug"></div>
        </div>
        <button class="btn btn-confirm" id="prel-confirm-btn" onclick="confermaPrelievo(null)" disabled>
          &#128230; Conferma Prelievo
        </button>
      </div>

      <div class="card" id="prel-log-card">
        <div class="card-title">
          <span class="icon">&#128203;</span>
          <span>Ultimi prelievi</span>
        </div>
        <div id="prel-session-log">
          <div style="text-align:center;color:var(--text-light);padding:20px;font-size:14px;">Caricamento...</div>
        </div>
      </div>
    </div>

    <!-- FASE 3: RICEZIONE -->
    <div class="phase-panel" id="panel-ricezione">
      <div class="card">
        <div class="field-group">
          <div class="field-label">Codice ODV</div>
          <div class="field-input-row">
            <input type="text" class="field-input" id="ric-odv" placeholder="Digita o scansiona il codice ODV" oninput="document.getElementById('ric-confirm-btn').disabled=!this.value.trim()">
            <button class="btn-scan-inline" id="ric-scan-btn" onclick="capturePhoto('ricezione')" title="Scansiona ODV"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><rect x="1" y="3" width="2" height="18"/><rect x="4" y="3" width="1" height="18"/><rect x="6" y="3" width="3" height="18"/><rect x="10" y="3" width="1" height="18"/><rect x="12" y="3" width="2" height="18"/><rect x="15" y="3" width="1" height="18"/><rect x="17" y="3" width="3" height="18"/><rect x="21" y="3" width="2" height="18"/></svg></button>
          </div>
          <input type="file" id="file-ric" accept="image/*" capture="environment" style="display:none" onchange="processPhotoFile(this,'ricezione')">
          <div class="scan-debug" id="ric-scan-debug"></div>
        </div>
        <button class="btn btn-confirm" id="ric-confirm-btn" onclick="confermaRicezione(null)" disabled>
          &#9989; Conferma Ricezione
        </button>
      </div>

      <div class="card" id="ric-log-card">
        <div class="card-title">
          <span class="icon">&#128203;</span>
          <span>Ultime ricezioni</span>
        </div>
        <div id="ric-session-log">
          <div style="text-align:center;color:var(--text-light);padding:20px;font-size:14px;">Caricamento...</div>
        </div>
      </div>
    </div>

    <!-- MONITOR -->
    <div class="phase-panel" id="panel-monitor">
      <div class="stats-row">
        <div class="stat-card aperti">
          <div class="stat-number" id="stat-aperti">-</div>
          <div class="stat-label">Aperti</div>
        </div>
        <div class="stat-card prelevati">
          <div class="stat-number" id="stat-prelevati">-</div>
          <div class="stat-label">Prelevati</div>
        </div>
        <div class="stat-card chiusi">
          <div class="stat-number" id="stat-chiusi">-</div>
          <div class="stat-label">Chiusi</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          <span class="icon">&#128203;</span>
          <span>Ultime attivit&agrave;</span>
        </div>
        <div id="activity-log">
          <div style="text-align:center; color:var(--text-light); padding:20px; font-size:14px;">
            Caricamento...
          </div>
        </div>
      </div>

      <button class="btn btn-primary" onclick="aggiornaMonitor()" style="margin-top:8px">
        &#128260; Aggiorna Dati
      </button>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ================================================
    // CONFIGURAZIONE
    // ================================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbxhG7eFPAvDaGmFky_mVDyVanW-2F20jvjftrNnytBjITw-s-yriYegDYc_kBNQT7sc/exec';
    const ZXING_FALLBACK_URL = 'https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js';

    const state = {
      currentPhase: 'registrazione',
      regStep: 1,
      prelieviSessione: [],
      ricezioniSessione: [],
      manualMode: { registrazione: false, prelievo: false, ricezione: false }
    };

    const PHASE_ABBR   = { registrazione: 'reg', prelievo: 'prel', ricezione: 'ric' };
    const buttonMap    = { registrazione: 'reg-scan-btn',   prelievo: 'prel-scan-btn',   ricezione: 'ric-scan-btn' };
    const debugMap     = { registrazione: 'reg-scan-debug', prelievo: 'prel-scan-debug', ricezione: 'ric-scan-debug' };

    async function ensureZXingLoaded() {
      if (window.ZXing) return true;

      return new Promise(function(resolve) {
        var existing = document.getElementById('zxing-fallback-script');
        if (existing) {
          existing.addEventListener('load', function() { resolve(!!window.ZXing); }, { once: true });
          existing.addEventListener('error', function() { resolve(false); }, { once: true });
          return;
        }

        var script = document.createElement('script');
        script.id = 'zxing-fallback-script';
        script.src = ZXING_FALLBACK_URL;
        script.async = true;
        script.onload = function() { resolve(!!window.ZXing); };
        script.onerror = function() { resolve(false); };
        document.head.appendChild(script);
      });
    }

    // ================================================
    // NAVIGAZIONE
    // ================================================
    function switchPhase(phase) {
      stopScan();
      state.currentPhase = phase;
      document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
      document.getElementById('tab-' + phase).classList.add('active');
      document.querySelectorAll('.phase-panel').forEach(function(p) { p.classList.remove('active'); });
      document.getElementById('panel-' + phase).classList.add('active');
      if (phase === 'monitor') aggiornaMonitor();
      if (phase === 'prelievo') caricaStoricoPrelievi();
      if (phase === 'ricezione') caricaStoricoRicezioni();
    }

    // ================================================
    // API
    // ================================================
    async function apiCall(action, payload) {
      const body = Object.assign({ action: action }, payload || {});
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(body)
      });
      const text = await response.text();
      try { return JSON.parse(text); }
      catch (e) { throw new Error('Risposta non valida: ' + text.substring(0, 100)); }
    }

    // ================================================
    // SCANNER — lettura codice a barre da foto
    // ================================================

    // Apre la fotocamera nativa del dispositivo per scattare una foto
    function capturePhoto(phase) {
      var input = document.getElementById('file-' + PHASE_ABBR[phase]);
      input.value = '';   // reset per permettere la stessa foto due volte
      input.click();
    }

    // Viene chiamata quando l'utente ha scattato/scelto una foto
    async function processPhotoFile(inputEl, phase) {
      var file = inputEl.files && inputEl.files[0];
      if (!file) return;

      var abbr   = PHASE_ABBR[phase];
      var debugEl = document.getElementById(debugMap[phase]);
      var btnEl   = document.getElementById(buttonMap[phase]);
      var previewEl = document.getElementById('preview-' + abbr);

      function setDebug(msg, cls) {
        if (!debugEl) return;
        debugEl.textContent = msg;
        debugEl.className = 'scan-debug' + (cls ? ' ' + cls : '');
      }

      // Mostra anteprima e stato "lettura in corso"
      var objectUrl = URL.createObjectURL(file);
      if (previewEl) { previewEl.src = objectUrl; previewEl.style.display = 'block'; }
      if (btnEl) btnEl.disabled = true;
      setDebug('Lettura codice a barre...', 'active');

      try {
        var bitmap = await createImageBitmap(file);
        var code = null;

        // ── Percorso A: BarcodeDetector (nativo, gestisce qualsiasi orientazione)
        if (!code && 'BarcodeDetector' in window) {
          try {
            var det = new BarcodeDetector({ formats: ['code_128'] });
            var found = await det.detect(bitmap);
            if (found.length > 0) code = found[0].rawValue;
          } catch(e) {}
        }

        // ── Percorso B: ZXing — se BarcodeDetector non disponibile o non ha trovato nulla
        if (!code) {
          if (!window.ZXing) await ensureZXingLoaded();
          if (window.ZXing) {
            try {
              var canvas = document.createElement('canvas');
              canvas.width  = bitmap.width;
              canvas.height = bitmap.height;
              canvas.getContext('2d').drawImage(bitmap, 0, 0);
              var hints = new Map();
              hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.CODE_128]);
              hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
              var reader = new ZXing.BrowserMultiFormatReader(hints);
              var res = await reader.decodeFromCanvas(canvas);
              if (res) code = typeof res.getText === 'function' ? res.getText() : res.text;
            } catch(e) {}
          }
        }

        if (code) {
          setDebug('Letto: ' + code, 'active');
          onBarcodeDetected(code, phase);
        } else {
          setDebug('Nessun codice trovato — riprova', '');
          showToast('Nessun codice trovato nella foto — riprova', 'warning');
        }

      } catch(err) {
        console.error('[Photo scan]', err);
        setDebug('Errore lettura — riprova', '');
        showToast('Errore durante la lettura della foto', 'error');
      } finally {
        if (btnEl) btnEl.disabled = false;
        URL.revokeObjectURL(objectUrl);
        // Nasconde l'anteprima dopo 2 s
        if (previewEl) setTimeout(function() { previewEl.style.display = 'none'; }, 2000);
      }
    }

    // No-op: mantenuto per compatibilità con le chiamate esistenti nei reset
    function stopScan() {}

    function onBarcodeDetected(code, phase) {
      var cleanCode = String(code || '').trim();
      if (!cleanCode) return;

      // Rifiuta codici con caratteri non validi (=, ;, <, :, ! ecc.)
      // causati da errori di charset Code 128 — accetta solo [A-Z0-9-]
      if (!/^[A-Z0-9][A-Z0-9\-]{6,}$/.test(cleanCode) || cleanCode.indexOf('-') === -1) {
        console.warn('[Scan] Scartato: formato non valido:', cleanCode);
        var dbg = document.getElementById(debugMap[phase]);
        if (dbg) { dbg.textContent = 'Codice non valido — riprova'; dbg.className = 'scan-debug warn'; }
        showToast('Codice non riconosciuto — riprova', 'warning');
        return;
      }

      if (navigator.vibrate) navigator.vibrate(100);

      switch (phase) {
        case 'registrazione':
          handleRegScan(cleanCode);
          break;
        case 'prelievo':
          confermaPrelievo(cleanCode);
          break;
        case 'ricezione':
          confermaRicezione(cleanCode);
          break;
      }
    }

    // ================================================
    // FASE 1 — REGISTRAZIONE
    // ================================================
    function capturePhotoForRegField(field) {
      var input = document.getElementById('file-reg-' + field);
      input.value = '';
      input.click();
    }

    async function processRegFieldPhoto(inputEl, field) {
      var file = inputEl.files && inputEl.files[0];
      if (!file) return;

      var fieldEl  = document.getElementById('reg-' + field);
      var btnEl    = document.getElementById('reg-' + field + '-scan-btn');
      var debugEl  = document.getElementById('reg-' + field + '-debug');
      var badgeEl  = document.getElementById('reg-' + field + '-badge');

      function setDebug(msg, cls) {
        if (!debugEl) return;
        debugEl.textContent = msg;
        debugEl.className = 'scan-debug' + (cls ? ' ' + cls : '');
      }

      if (btnEl) btnEl.disabled = true;
      setDebug('Lettura codice a barre...', 'active');

      try {
        var bitmap = await createImageBitmap(file);
        var code = null;

        if (!code && 'BarcodeDetector' in window) {
          try {
            var det = new BarcodeDetector({ formats: ['code_128'] });
            var found = await det.detect(bitmap);
            if (found.length > 0) code = found[0].rawValue;
          } catch(e) {}
        }

        if (!code) {
          if (!window.ZXing) await ensureZXingLoaded();
          if (window.ZXing) {
            try {
              var canvas = document.createElement('canvas');
              canvas.width  = bitmap.width;
              canvas.height = bitmap.height;
              canvas.getContext('2d').drawImage(bitmap, 0, 0);
              var hints = new Map();
              hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.CODE_128]);
              hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
              var reader = new ZXing.BrowserMultiFormatReader(hints);
              var res = await reader.decodeFromCanvas(canvas);
              if (res) code = typeof res.getText === 'function' ? res.getText() : res.text;
            } catch(e) {}
          }
        }

        if (code) {
          var cleanCode = String(code).trim();
          if (!/^[A-Z0-9][A-Z0-9\-]{6,}$/.test(cleanCode) || cleanCode.indexOf('-') === -1) {
            setDebug('Codice non valido — riprova', 'warn');
            showToast('Codice non riconosciuto — riprova', 'warning');
          } else {
            if (navigator.vibrate) navigator.vibrate(100);
            fieldEl.value = cleanCode;
            fieldEl.classList.add('scanned');
            if (badgeEl) badgeEl.style.display = 'inline-flex';
            setDebug('Letto: ' + cleanCode, 'active');
            showToast((field === 'odv' ? 'ODV' : 'CL') + ' scansionato!', 'success');
            checkRegReady();
          }
        } else {
          setDebug('Nessun codice trovato — riprova', '');
          showToast('Nessun codice trovato nella foto — riprova', 'warning');
        }

      } catch(err) {
        console.error('[Photo scan]', err);
        setDebug('Errore lettura — riprova', '');
        showToast('Errore durante la lettura della foto', 'error');
      } finally {
        if (btnEl) btnEl.disabled = false;
      }
    }

    function checkRegReady() {
      var odv = document.getElementById('reg-odv').value.trim();
      var cl = document.getElementById('reg-cl').value.trim();
      var data = document.getElementById('reg-data').value;
      document.getElementById('reg-confirm-btn').disabled = !(odv && cl && data);
    }

    async function confermaRegistrazione() {
      var odv = document.getElementById('reg-odv').value.trim();
      var cl = document.getElementById('reg-cl').value.trim();
      var data = document.getElementById('reg-data').value;
      if (!odv || !cl || !data) { showToast('Compila tutti i campi', 'warning'); return; }

      var btn = document.getElementById('reg-confirm-btn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Salvataggio...';

      try {
        var result = await apiCall('registraODV', { codiceODV: odv, codiceCL: cl, dataConsegnaPrevista: data });
        if (result.success) {
          showToast('Registrato: ' + odv + ' \u2194 ' + cl, 'success');
          resetRegistrazione();
        } else {
          showToast(result.message || 'Errore', result.type === 'duplicate' ? 'warning' : 'error');
          btn.disabled = false; btn.innerHTML = '&#10004; Conferma Registrazione';
        }
      } catch (err) {
        showToast('Errore di connessione: ' + err.message, 'error');
        btn.disabled = false; btn.innerHTML = '&#10004; Conferma Registrazione';
      }
    }

    function resetRegistrazione() {
      document.getElementById('reg-odv').value = '';
      document.getElementById('reg-cl').value = '';
      document.getElementById('reg-data').value = '';
      document.getElementById('reg-odv').classList.remove('scanned');
      document.getElementById('reg-cl').classList.remove('scanned');
      document.getElementById('reg-odv-badge').style.display = 'none';
      document.getElementById('reg-cl-badge').style.display = 'none';
      document.getElementById('reg-odv-debug').textContent = '';
      document.getElementById('reg-cl-debug').textContent = '';
      document.getElementById('reg-confirm-btn').disabled = true;
      document.getElementById('reg-confirm-btn').innerHTML = '&#10004; Conferma Registrazione';
    }

    // ================================================
    // FASE 2 — PRELIEVO
    // ================================================
    async function confermaPrelievo(odv) {
      if (!odv) odv = (document.getElementById('prel-odv').value || '').trim();
      if (!odv) { showToast('Scansiona o digita un ODV', 'warning'); return; }
      document.getElementById('prel-odv').value = odv;
      var btn = document.getElementById('prel-confirm-btn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Salvataggio...'; }
      try {
        var result = await apiCall('registraPrelievo', { codiceODV: odv });
        if (result.success) {
          showToast('Prelievo: ' + odv + ' (CL: ' + result.data.cl + ')', 'success');
          document.getElementById('prel-odv').value = '';
          if (btn) { btn.disabled = true; btn.innerHTML = '&#128230; Conferma Prelievo'; }
          caricaStoricoPrelievi();
        } else {
          showToast(result.message || 'Errore', 'error');
          if (btn) { btn.disabled = false; btn.innerHTML = '&#128230; Conferma Prelievo'; }
        }
      } catch (err) {
        showToast('Errore: ' + err.message, 'error');
        if (btn) { btn.disabled = false; btn.innerHTML = '&#128230; Conferma Prelievo'; }
      }
    }

    // ================================================
    // FASE 3 — RICEZIONE
    // ================================================
    async function confermaRicezione(odv) {
      if (!odv) odv = (document.getElementById('ric-odv').value || '').trim();
      if (!odv) { showToast('Scansiona o digita un ODV', 'warning'); return; }
      document.getElementById('ric-odv').value = odv;
      var btn = document.getElementById('ric-confirm-btn');
      if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Salvataggio...'; }
      try {
        var result = await apiCall('registraRicezione', { codiceODV: odv });
        if (result.success) {
          showToast('Chiuso: ' + odv + ' (CL: ' + result.data.cl + ')', 'success');
          document.getElementById('ric-odv').value = '';
          if (btn) { btn.disabled = true; btn.innerHTML = '&#9989; Conferma Ricezione'; }
          caricaStoricoRicezioni();
        } else {
          showToast(result.message || 'Errore', 'error');
          if (btn) { btn.disabled = false; btn.innerHTML = '&#9989; Conferma Ricezione'; }
        }
      } catch (err) {
        showToast('Errore: ' + err.message, 'error');
        if (btn) { btn.disabled = false; btn.innerHTML = '&#9989; Conferma Ricezione'; }
      }
    }

    // ================================================
    // STORICO PRELIEVI / RICEZIONI (da API)
    // ================================================
    async function caricaStoricoPrelievi() {
      var container = document.getElementById('prel-session-log');
      container.innerHTML = '<div style="text-align:center;color:var(--text-light);padding:20px;font-size:14px;">Caricamento...</div>';
      try {
        var result = await apiCall('getUltimeRegistrazioni', { stato: 'prelevato', n: 20 });
        var items = (result.data || []).filter(function(i) { return String(i.stato || '').toLowerCase() === 'prelevato'; });
        if (!items.length) {
          container.innerHTML = '<div style="text-align:center;color:var(--text-light);padding:20px;font-size:14px;">Nessun prelievo recente</div>';
          return;
        }
        var html = '';
        items.forEach(function(item) {
          var odv = String(item.odv || '');
          html += '<div class="log-item log-item-clickable" onclick="chiediAnnullaPrelievo(\'' + odv + '\')">';
          html += '<div class="log-dot prelevato"></div>';
          html += '<div class="log-info">';
          html += '<div class="log-codes">ODV: ' + escapeHtml(odv) + ' &rarr; CL: ' + escapeHtml(item.cl || '') + '</div>';
          html += '<div class="log-date">' + escapeHtml(item.dataPrelievo || item.dataConsegnaPrevista || '') + '</div>';
          html += '</div>';
          html += '<div class="log-cancel">&#10005; Annulla</div>';
          html += '</div>';
        });
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = '<div style="text-align:center;color:var(--danger);padding:20px;font-size:14px;">Errore caricamento</div>';
      }
    }

    async function caricaStoricoRicezioni() {
      var container = document.getElementById('ric-session-log');
      container.innerHTML = '<div style="text-align:center;color:var(--text-light);padding:20px;font-size:14px;">Caricamento...</div>';
      try {
        var result = await apiCall('getUltimeRegistrazioni', { stato: 'chiuso', n: 20 });
        var items = (result.data || []).filter(function(i) { return String(i.stato || '').toLowerCase() === 'chiuso'; });
        if (!items.length) {
          container.innerHTML = '<div style="text-align:center;color:var(--text-light);padding:20px;font-size:14px;">Nessuna ricezione recente</div>';
          return;
        }
        var html = '';
        items.forEach(function(item) {
          var odv = String(item.odv || '');
          html += '<div class="log-item log-item-clickable" onclick="chiediAnnullaRicezione(\'' + odv + '\')">';
          html += '<div class="log-dot chiuso"></div>';
          html += '<div class="log-info">';
          html += '<div class="log-codes">ODV: ' + escapeHtml(odv) + ' &rarr; CL: ' + escapeHtml(item.cl || '') + '</div>';
          html += '<div class="log-date">' + escapeHtml(item.dataRicezione || item.dataConsegnaPrevista || '') + '</div>';
          html += '</div>';
          html += '<div class="log-cancel">&#10005; Annulla</div>';
          html += '</div>';
        });
        container.innerHTML = html;
      } catch (err) {
        container.innerHTML = '<div style="text-align:center;color:var(--danger);padding:20px;font-size:14px;">Errore caricamento</div>';
      }
    }

    function chiediAnnullaPrelievo(odv) {
      if (!confirm('Annullare il prelievo di ODV: ' + odv + '?')) return;
      annullaPrelievo(odv);
    }

    async function annullaPrelievo(odv) {
      try {
        var result = await apiCall('annullaPrelievo', { codiceODV: odv });
        if (result.success) {
          showToast('Prelievo annullato: ' + odv, 'success');
          caricaStoricoPrelievi();
        } else {
          showToast(result.message || 'Errore annullamento', 'error');
        }
      } catch (err) {
        showToast('Errore: ' + err.message, 'error');
      }
    }

    function chiediAnnullaRicezione(odv) {
      if (!confirm('Annullare la ricezione di ODV: ' + odv + '?')) return;
      annullaRicezione(odv);
    }

    async function annullaRicezione(odv) {
      try {
        var result = await apiCall('annullaRicezione', { codiceODV: odv });
        if (result.success) {
          showToast('Ricezione annullata: ' + odv, 'success');
          caricaStoricoRicezioni();
        } else {
          showToast(result.message || 'Errore annullamento', 'error');
        }
      } catch (err) {
        showToast('Errore: ' + err.message, 'error');
      }
    }

    // ================================================
    // MONITOR
    // ================================================
    async function aggiornaMonitor() {
      try {
        var statsResp = await apiCall('getStats');
        var stats = statsResp.data || statsResp;
        document.getElementById('stat-aperti').textContent = stats.aperti ?? 0;
        document.getElementById('stat-prelevati').textContent = stats.prelevati ?? 0;
        document.getElementById('stat-chiusi').textContent = stats.chiusi ?? 0;
      } catch (err) { console.error(err); }

      try {
        var itemsResp = await apiCall('getUltimeRegistrazioni', { n: 15 });
        var items = itemsResp.data || [];
        var container = document.getElementById('activity-log');
        if (!items || items.length === 0) {
          container.innerHTML = '<div style="text-align:center;color:var(--text-light);padding:20px;font-size:14px;">Nessuna registrazione</div>';
          return;
        }
        var html = '';
        items.forEach(function(item) {
          var statoClass = String(item.stato || '').toLowerCase();
          html += '<div class="log-item">';
          html += '<div class="log-dot ' + statoClass + '"></div>';
          html += '<div class="log-info">';
          html += '<div class="log-codes">ODV: ' + escapeHtml(item.odv || '') + ' &rarr; CL: ' + escapeHtml(item.cl || '') + '</div>';
          html += '<div class="log-date">Consegna prevista: ' + escapeHtml(item.dataConsegnaPrevista || '') + '</div>';
          html += '</div>';
          html += '<div class="log-stato ' + statoClass + '">' + escapeHtml(item.stato || '') + '</div>';
          html += '</div>';
        });
        container.innerHTML = html;
      } catch (err) {
        document.getElementById('activity-log').innerHTML =
          '<div style="text-align:center;color:var(--danger);padding:20px;font-size:14px;">Errore caricamento</div>';
      }
    }

    // ================================================
    // INSERIMENTO MANUALE
    // ================================================
    function toggleManualInput(phase) {
      var isManual = !state.manualMode[phase];
      state.manualMode[phase] = isManual;

      if (phase === 'registrazione') {
        return;
      }
      if (phase === 'prelievo') { return; }
      if (phase === 'ricezione') { return; }
    }

    // ================================================
    // UTILITIES
    // ================================================
    function escapeHtml(value) {
      return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function showToast(message, type) {
      var toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + (type || 'info');
      toast.offsetHeight;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 3000);
    }

    // ================================================
    // INIT
    // ================================================
    document.addEventListener('DOMContentLoaded', function() {
      updateRegSteps();
      document.getElementById('reg-data').addEventListener('change', checkRegReady);
      document.getElementById('reg-odv').addEventListener('input', checkRegReady);
      document.getElementById('reg-cl').addEventListener('input', checkRegReady);
      document.getElementById('prel-odv').addEventListener('input', function() {
        var btn = document.getElementById('prel-confirm-btn');
        if (btn) btn.disabled = !this.value.trim();
      });
      document.getElementById('ric-odv').addEventListener('input', function() {
        var btn = document.getElementById('ric-confirm-btn');
        if (btn) btn.disabled = !this.value.trim();
      });
    });
  </script>
